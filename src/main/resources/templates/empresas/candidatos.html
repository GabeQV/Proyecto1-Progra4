<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Candidatos para el puesto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
    </style>
</head>
<body>

<header th:replace="~{fragments/header-empresa :: header-empresa}"></header>

<div class="container mt-4 flex-grow-1">

    <h2>Candidatos para el puesto</h2>
    <p class="text-muted">
        Puesto: <strong th:text="${puesto.descripcion}"></strong>
    </p>

    <div th:if="${resultados.isEmpty()}" class="alert alert-info">
        No se encontraron candidatos que cumplan al menos un requisito del puesto.
    </div>

    <div th:if="${!resultados.isEmpty()}">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>Oferente</th>
                <th class="text-center">Requisitos cumplidos</th>
                <th class="text-center">% Coincidencia</th>
                <th class="text-center">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${resultados}">
                <td th:text="${r.oferente.nombre + ' ' + r.oferente.primerApellido}"></td>
                <td class="text-center"
                    th:text="${r.requistosCumplidos + ' / ' + r.requisitosTotal}"></td>
                <td class="text-center">
                    <span th:text="${#numbers.formatDecimal(r.porcentaje, 1, 2) + ' %'}"></span>
                </td>
                <td class="text-center">
                    <a th:href="@{/empresa/candidatos/{id}(id=${r.oferente.id}, puestoId=${puesto.id})}"
                       class="btn btn-info btn-sm">Ver detalle</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <a th:href="@{/empresa/puestos}" class="btn btn-secondary mt-2">Volver</a>
</div>

<footer th:replace="~{fragments/footer-interno :: footer-interno}"></footer>

</body>
</html>
