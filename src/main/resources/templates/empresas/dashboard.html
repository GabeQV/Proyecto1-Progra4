<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Empresa - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
    </style>
</head>
<body>

<header th:replace="~{fragments/header-empresa :: header-empresa}"></header>

<div class="container mt-5 flex-grow-1">
    <div class="bg-light p-5 rounded">

        <h1>Empresa - Dashboard</h1>

        <p class="lead">
            Bienvenido, <strong th:text="${empresa.nombre}">Empresa</strong>.
            Desde aquí podés administrar tus puestos y buscar candidatos.
        </p>

        <div class="mt-4">
            <a th:href="@{/empresa/puestos}"
               class="btn btn-primary me-2">
                Ver mis puestos
            </a>
            <a th:href="@{/empresa/puestos/nuevo}"
               class="btn btn-success">
                Publicar nuevo puesto
            </a>
        </div>

    </div>
</div>

<footer th:replace="~{fragments/footer-interno :: footer-interno}"></footer>

</body>
</html>
