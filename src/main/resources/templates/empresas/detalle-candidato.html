<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Detalle del Candidato</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
  </style>
</head>
<body>

<header th:replace="~{fragments/header-empresa :: header-empresa}"></header>

<div class="container mt-4 flex-grow-1">

  <h2>Detalle de oferente</h2>

  <div class="card mb-4">
    <div class="card-body">
      <h5 th:text="${oferente.nombre + ' ' + oferente.primerApellido
                           + (oferente.segundoApellido != null ? ' ' + oferente.segundoApellido : '')}">
      </h5>
      <p class="mb-1"><strong>Identificación:</strong>
        <span th:text="${oferente.id}"></span></p>
      <p class="mb-1"><strong>Email:</strong>
        <span th:text="${oferente.usuario.correo}"></span></p>
      <p class="mb-1"><strong>Teléfono:</strong>
        <span th:text="${oferente.telefono}"></span></p>
      <p class="mb-0"><strong>Residencia:</strong>
        <span th:text="${oferente.residencia}"></span></p>
    </div>
  </div>

  <h5>Habilidades</h5>
  <table class="table table-bordered table-sm w-50 mb-4">
    <thead class="table-secondary">
    <tr>
      <th>Característica</th>
      <th class="text-center">Nivel</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="h : ${habilidades}">
      <td th:text="${h.idCaracteristica.nombre}"></td>
      <td class="text-center" th:text="${h.nivel}"></td>
    </tr>
    <tr th:if="${habilidades.isEmpty()}">
      <td colspan="2" class="text-muted text-center">Sin habilidades registradas.</td>
    </tr>
    </tbody>
  </table>

  <div th:if="${oferente.cvRuta != null}" class="mb-3">
    <a th:href="@{/empresa/candidatos/cv/{id}(id=${oferente.id})}"
       class="btn btn-outline-primary">
      📄 Ver / Descargar CV
    </a>
  </div>
  <div th:if="${oferente.cvRuta == null}" class="text-muted mb-3">
    Este candidato no ha subido su CV.
  </div>

  <a th:href="@{/empresa/candidatos(puestoId=${puestoId})}"
     class="btn btn-secondary">Volver</a>
</div>

<footer th:replace="~{fragments/footer-interno :: footer-interno}"></footer>

</body>
</html>
