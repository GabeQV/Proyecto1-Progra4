<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Oferente - Mi CV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; background-color: #f8f9fa; }

        .nav-brand-logo {
            width: 36px;
            height: 36px;
            background: #0d6efd;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            margin-right: 10px;
        }

        .upload-icon {
            font-size: 3rem;
            color: #adb5bd;
            display: block;
            margin-bottom: 0.75rem;
        }

        .cv-card {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .cv-card .pdf-icon { font-size: 2rem; color: #dc3545; flex-shrink: 0; }
        .cv-card .cv-name  { font-weight: 600; font-size: 0.95rem; word-break: break-all; }

        .panel-upload {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 1.5rem;
        }
    </style>
</head>
<body>

<header th:replace="~{fragments/header-oferente :: header-oferente}"></header>

<div class="container mt-4 flex-grow-1">

    <h4 class="mb-4">Mi CV</h4>

    <div th:if="${mensajeExito}" class="alert alert-success" role="alert">
        <span th:text="${mensajeExito}"></span>
    </div>
    <div th:if="${mensajeError}" class="alert alert-danger" role="alert">
        <span th:text="${mensajeError}"></span>
    </div>

    <div class="row g-4">

        <div class="col-md-5">
            <div class="panel-upload h-100">
                <h6 class="mb-3">CV actual</h6>

                <div th:if="${oferente.cvRuta != null}">
                    <div class="cv-card mb-3">
                        <span class="pdf-icon">📄</span>
                        <div>
                            <div class="cv-name" th:text="${oferente.cvRuta}">curriculum.pdf</div>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <a th:href="@{/oferente/CV/descargar}"
                           class="btn btn-outline-primary btn-sm">
                            Descargar
                        </a>

                        <form th:action="@{/oferente/CV/eliminar}" method="post">
                            <button type="submit"
                                    class="btn btn-outline-danger btn-sm">
                                Eliminar
                            </button>
                        </form>
                    </div>
                </div>

                <div th:if="${oferente.cvRuta == null}">
                    <div class="text-center text-muted py-4">
                        <span style="font-size:2.5rem;">📭</span>
                        <p class="mt-2 mb-0 small">Aún no has subido tu CV.</p>
                    </div>
                </div>

            </div>
        </div>

        <div class="col-md-7">
            <div class="panel-upload">
                <h6 class="mb-3">
                    <span th:if="${oferente.cvRuta != null}">Reemplazar CV</span>
                    <span th:if="${oferente.cvRuta == null}">Subir CV</span>
                </h6>

                <form th:action="@{/oferente/CV/subir}" method="post" enctype="multipart/form-data">

                    <input type="file" id="archivoCV" name="archivo"
                           accept="application/pdf"
                           class="form-control form-control-sm mb-3" required />
                    <div class="d-flex justify-content-end">
                        <button type="submit" class="btn btn-primary">⬆ Subir CV</button>
                    </div>
                </form>

                <hr class="my-3">
                <ul class="small text-muted mb-0 ps-3">
                    <li>El archivo debe estar en formato <strong>PDF</strong>.</li>
                    <li>El tamaño máximo permitido es <strong>5 MB</strong>.</li>
                    <li>Si ya tenés un CV cargado, este será <strong>reemplazado</strong>.</li>
                    <li>Tu CV será visible para las empresas que busquen tu perfil.</li>
                </ul>
            </div>
        </div>

    </div>
</div>

<footer th:replace="~{fragments/footer-interno :: footer-interno}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
