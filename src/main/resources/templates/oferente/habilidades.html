<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Oferente - Habilidades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; background-color: #f8f9fa; }

        .nav-brand-logo {
            width: 34px; height: 34px;
            background: #0d6efd; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 13px; margin-right: 8px;
        }

        .panel-verde {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 1.1rem 1.15rem;
            height: 100%;
        }

        .tbl-hab th {
            font-weight: 700;
            font-size: 0.85rem;
            padding: 0.3rem 0.4rem;
            border-bottom: 2px solid #dee2e6;
        }
        .tbl-hab td {
            font-size: 0.85rem;
            padding: 0.3rem 0.4rem;
        }
        .tbl-hab tbody tr:hover td { background: #e8f5e9; }

        .btn-ruta {
            display: inline-block;
            padding: 2px 10px;
            border: 1px solid #adb5bd;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #343a40;
            text-decoration: none;
            background: white;
            line-height: 1.6;
        }
        .btn-ruta:hover { background: #e9ecef; color: #000; }

        .subcat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.75rem;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            background: white;
            margin-bottom: 7px;
            font-size: 0.87rem;
        }
    </style>
</head>
<body>

<header th:replace="~{fragments/header-oferente :: header-oferente}"></header>

<div class="container-fluid px-4 mt-4 flex-grow-1">

    <h5 class="mb-3">Mis habilidades</h5>

    <div class="row g-3 align-items-start">

        <div class="col-md-3">
            <div class="panel-verde">
                <table class="table table-borderless tbl-hab mb-0 w-100">
                    <thead>
                    <tr>
                        <th>Característica</th>
                        <th class="text-end">Nivel</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="h : ${misHabilidades}">
                        <td th:text="${h.idCaracteristica.nombre}">Característica</td>
                        <td class="text-end" th:text="${h.nivel}">3</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(misHabilidades)}">
                        <td colspan="2" class="text-muted small text-center pt-3">
                            Aún no tenés habilidades registradas.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="col-md-5">
            <div class="panel-verde">

                <div class="mb-2 d-flex align-items-center flex-wrap gap-1">
                    <span class="small fw-semibold me-1">Ruta:</span>
                    <a th:href="@{/oferente/habilidad}" class="btn-ruta">Raíces</a>
                    <span th:each="nodo : ${breadcrumbs}" class="d-flex align-items-center gap-1">
                        <span class="text-muted small">/</span>
                        <a th:href="@{/oferente/habilidad(actualId=${nodo.id})}"
                           th:text="${nodo.nombre}"
                           class="btn-ruta">Nodo</a>
                    </span>
                </div>

                <p class="small mb-2" th:text="${titulo}">Subcategorías de: JUnit</p>

                <div th:each="sub : ${subCategorias}">
                    <div class="subcat-row">
                        <span th:text="${sub.nombre}">Subcategoría</span>
                        <a th:href="@{/oferente/habilidad(actualId=${sub.id})}"
                           class="btn btn-outline-secondary btn-sm py-0 px-3">Entrar</a>
                    </div>
                </div>

                <p th:if="${#lists.isEmpty(subCategorias)}"
                   class="text-muted small mb-0 mt-1">
                    No hay subcategorías en este nivel.
                </p>

            </div>
        </div>

        <div class="col-md-4">
            <div class="panel-verde">
                <h6 class="mb-3 fw-semibold">Agregar Habilidad</h6>
                <form th:action="@{/oferente/habilidad/agregar}" method="post">

                    <input type="hidden" name="actualId"
                           th:value="${categoriaActual != null ? categoriaActual.id : ''}"/>

                    <div class="mb-3">
                        <label class="form-label small fw-semibold mb-1">Característica</label>
                        <select name="idCaracteristica" class="form-select form-select-sm" required>
                            <option value="">-- Seleccioná --</option>
                            <option th:each="cat : ${todasCategorias}"
                                    th:value="${cat.id}"
                                    th:text="${cat.nombre}"
                                    th:selected="${categoriaActual != null and cat.id == categoriaActual.id}">
                                Categoría
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-semibold mb-1">Nivel (1-5)</label>
                        <input type="number" name="nivel" min="1" max="5" value="4"
                               class="form-control form-control-sm" required/>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Agregar</button>

                </form>
            </div>
        </div>

    </div>
</div>

<footer th:replace="~{fragments/footer-interno :: footer-interno}"></footer>

</body>
</html>
