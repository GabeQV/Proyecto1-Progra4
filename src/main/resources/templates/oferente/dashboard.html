<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Empresa - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
    </style>
</head>
<body>

<header th:replace="~{fragments/header-oferente :: header-oferente}"></header>

<div class="container mt-5 flex-grow-1">
    <div class="bg-light p-5 rounded">

        <h1>Oferente - Dashboard</h1>

        <p class="lead">
            Bienvenido, <strong th:text="${oferente.nombre}">Oferente</strong>.
            Desde aquí podés administrar tus Habilidades y subir tu CV.
        </p>

        <div class="mt-4">
            <a th:href="@{/oferente/habilidad}"
               class="btn btn-primary me-2">
                Ver mis habilidades
            </a>
            <a th:href="@{/oferente/CV}"
               class="btn btn-success">
                Publicar CV
            </a>
        </div>

    </div>
</div>

<footer th:replace="~{fragments/footer-interno :: footer-interno}"></footer>

</body>
</html>
