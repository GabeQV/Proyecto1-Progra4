<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Oferente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-container { max-width: 400px; margin: auto; padding-top: 100px; }
        .card { border-radius: 1rem; }
        .header { background-color: #343a40; color: white; }
        .footer { background-color: #343a40; color: white; position: fixed; bottom: 0; width: 100%; }
    </style>
</head>
<header class="header p-3">
    <div class="container d-flex justify-content-between align-items-center">
        <h4 class="mb-0">Bolsa de Empleo</h4>
        <nav>
            <a href="/" class="text-white me-3 text-decoration-none">Pagina Principal</a>
        </nav>
    </div>
</header>
<body class="bg-light">

<div class="container" style="max-width: 560px; padding-top: 60px; padding-bottom: 60px;">

    <div class="card shadow-sm">
        <div class="card-body p-4">

            <h4 class="mb-1">Registro de Empresa</h4>
            <p class="text-muted mb-4" style="font-size:14px;">
                Tu cuenta será revisada por un administrador antes de activarse.
            </p>

            <div th:if="${exito}" class="alert alert-success" role="alert">
                <span th:text="${exito}"></span>
            </div>

            <!-- Mensaje de ERROR — sin botón de cerrar -->
            <div th:if="${error}" class="alert alert-danger" role="alert">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/SaveOfer}" method="post">

                <p class="text-secondary mb-2">DATOS DE EMPRESA</p>

                <!-- ID -->
                <div class="mb-3">
                    <label class="form-label">Identificación</label>
                    <input type="text" class="form-control"
                           name="id" required>
                </div>

                <!-- Nombre -->
                <div class="mb-3">
                    <label class="form-label">Nombre de la empresa</label>
                    <input type="text" class="form-control"
                           name="nombre" required>
                </div>

                <!-- Localización -->
                <div class="mb-3">
                    <label class="form-label">Localización</label>
                    <input type="text" class="form-control"
                           name="localizacion" required>
                </div>

                <!-- Correo -->
                <div class="mb-3">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control"
                           name="correoElectronico" required>
                </div>

                <!-- Teléfono -->
                <div class="mb-3">
                    <label class="form-label">Teléfono</label>
                    <input type="text" class="form-control"
                           name="telefono" required>
                </div>

                <!-- Descripción -->
                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea class="form-control"
                              name="descripcion" rows="3"></textarea>
                </div>

                <!-- Clave -->
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-control"
                           name="clave" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Registrarme
                </button>

            </form>

            <p class="text-center mt-3 mb-0" style="font-size:13px;">
                ¿Ya tienes cuenta?
                <a th:href="@{/login}">Inicia sesión aquí</a>
            </p>

        </div>
    </div>
</div>
<footer class="footer p-3 mt-5 text-center">
    <div class="container">
        <span>Bolsa de Empleo - Total Soft Inc.</span> |
        <span>Contacto: info@bolsaempleo.local</span> |
        <span>Créditos: Equipo de desarrollo</span>
    </div>
</footer>

</body>
</html>
