<!-- templates/empresas/puestos.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis Puestos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
    </style>
</head>
<body>

<header th:replace="~{fragments/header-empresa :: header-empresa}"></header>

<div class="container mt-4 flex-grow-1">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Mis puestos</h2>
        <a th:href="@{/empresa/puestos/nuevo}" class="btn btn-success">
            Publicar puesto
        </a>
    </div>

    <div th:if="${puestos.isEmpty()}" class="alert alert-info">
        No tenés puestos publicados todavía.
    </div>

    <div th:if="${!puestos.isEmpty()}">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Descripción</th>
                <th>Salario</th>
                <th>Tipo</th>
                <th class="text-center">Activo</th>
                <th class="text-center">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="puesto : ${puestos}">

                <td th:text="${puesto.id}"></td>
                <td th:text="${puesto.descripcion}"></td>
                <td>
                    <span th:if="${puesto.moneda == 'COLON'}">₡</span>
                    <span th:if="${puesto.moneda == 'DOLAR'}">$</span>
                    <span th:text="${puesto.salario}"></span>
                </td>
                <td th:text="${puesto.tipoPuesto}"></td>

                <td class="text-center">
                        <span th:if="${puesto.activo}"
                              class="badge bg-success">Sí</span>
                    <span th:unless="${puesto.activo}"
                          class="badge bg-danger">No</span>
                </td>

                <td class="text-center">
                    <form th:action="@{/empresa/puestos/{id}/desactivar(id=${puesto.id})}"
                          method="post"
                          style="display:inline">
                        <button type="submit"
                                class="btn btn-warning btn-sm me-1"
                                th:disabled="${!puesto.activo}">
                            Desactivar
                        </button>
                    </form>

                    <a th:href="@{/empresa/candidatos(puestoId=${puesto.id})}"
                       class="btn btn-info btn-sm">
                        Buscar candidatos
                    </a>

                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<footer th:replace="~{fragments/footer-interno :: footer-interno}"></footer>

</body>
</html>
