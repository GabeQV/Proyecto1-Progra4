<!-- templates/empresas/puestos.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis Puestos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
    </style>
</head>
<body>

<!-- ── NAVBAR (igual que dashboard) ───────────────────── -->
<header class="bg-dark text-white p-3">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <h4 class="me-4 mb-0">BolsaEmpleo</h4>
            <nav>
                <a th:href="@{/empresa/dashboard}"
                   class="text-white-50 me-3 text-decoration-none">Dashboard</a>
                <a th:href="@{/empresa/puestos}"
                   class="text-white me-3 text-decoration-none fw-bold">Mis puestos</a>
                <a th:href="@{/empresa/puestos/nuevo}"
                   class="text-white-50 text-decoration-none">Publicar puesto</a>
            </nav>
        </div>
        <div class="d-flex align-items-center">
            <span class="me-3" th:text="${empresa.nombre}"></span>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Salir</button>
            </form>
        </div>
    </div>
</header>

<!-- ── CONTENIDO ───────────────────────────────────────── -->
<div class="container mt-4 flex-grow-1">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Mis puestos</h2>
        <a th:href="@{/empresa/puestos/nuevo}" class="btn btn-success">
            Publicar puesto
        </a>
    </div>

    <!-- Si no tiene puestos -->
    <div th:if="${puestos.isEmpty()}" class="alert alert-info">
        No tenés puestos publicados todavía.
    </div>

    <!-- Tabla de puestos -->
    <div th:if="${!puestos.isEmpty()}">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Descripción</th>
                <th>Salario</th>
                <th>Tipo</th>
                <th class="text-center">Activo</th>
                <th class="text-center">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="puesto : ${puestos}">

                <td th:text="${puesto.id}"></td>
                <td th:text="${puesto.descripcion}"></td>
                <td th:text="${puesto.salario}"></td>
                <td th:text="${puesto.tipoPuesto}"></td>

                <!-- Verde si activo, rojo si no -->
                <td class="text-center">
                        <span th:if="${puesto.activo}"
                              class="badge bg-success">Sí</span>
                    <span th:unless="${puesto.activo}"
                          class="badge bg-danger">No</span>
                </td>

                <td class="text-center">
                    <!-- Desactivar -->
                    <form th:action="@{/empresa/puestos/{id}/desactivar(id=${puesto.id})}"
                          method="post"
                          style="display:inline">
                        <button type="submit"
                                class="btn btn-warning btn-sm me-1"
                                th:disabled="${!puesto.activo}">
                            Desactivar
                        </button>
                    </form>

                    <!-- Buscar candidatos — lo conectás cuando hagás CoincidenciaService -->
                    <a th:href="@{/empresa/candidatos(puestoId=${puesto.id})}"
                       class="btn btn-info btn-sm">
                        Buscar candidatos
                    </a>

                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<!-- ── FOOTER ──────────────────────────────────────────── -->
<footer class="bg-dark text-white p-3 mt-auto text-center">
    <div class="container">
        <span class="me-3">Bolsa de Empleo - Total Soft Inc.</span> |
        <span class="mx-3">Contacto: info@bolsaempleo.local</span> |
        <span class="ms-3">Créditos: Equipo de desarrollo</span>
    </div>
</footer>

</body>
</html>
