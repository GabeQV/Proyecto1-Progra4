<!-- templates/puestos/nuevo-puesto.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Publicar Puesto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
    </style>
</head>
<body>

<header th:replace="~{fragments/header-empresa :: header-empresa}"></header>

<div class="container mt-4 flex-grow-1">
    <h2>Publicar nuevo puesto</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>

    <form th:action="@{/empresa/puestos/nuevo}" method="post">

        <div class="mb-3">
            <label class="form-label">Descripción del puesto</label>
            <input type="text"
                   name="descripcion"
                   class="form-control"
                   placeholder="Ej: Desarrollador Backend Java"
                   minlength="2"
                   pattern=".*\S.*"
                   title="Debe contener al menos una palabra"
                   required/>
            <div class="form-text">Mínimo una palabra, sin espacios en blanco.</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Salario ofrecido</label>
            <div class="input-group">

                <select name="moneda" class="form-select" style="max-width: 140px;">
                    <option value="COLON">₡ Colones</option>
                    <option value="DOLAR">$ Dólares</option>
                </select>

                <input type="number"
                       name="salario"
                       class="form-control"
                       placeholder="Ej: 500000"
                       min="1"
                       step="0.01"
                       title="El salario debe ser mayor o igual a 1"
                       required/>
            </div>
            <div class="form-text">El salario debe ser mayor o igual a 1.</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Tipo de publicación</label>
            <select name="tipoPuesto" class="form-select">
                <option value="publico">Público</option>
                <option value="privado">Privado</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Características requeridas</label>

            <div class="row g-2 mb-2 border p-2 rounded"
                 th:each="c : ${caracteristicas}">

                <div class="col-md-6 d-flex align-items-center">
                    <input type="hidden" name="idCaracteristicas" th:value="${c.id}"/>
                    <span th:text="${c.nombre}"></span>
                </div>

                <div class="col-md-6">
                    <select name="niveles" class="form-select">
                        <option value="0">No requerido</option>
                        <option value="1">Nivel 1</option>
                        <option value="2">Nivel 2</option>
                        <option value="3">Nivel 3</option>
                        <option value="4">Nivel 4</option>
                        <option value="5">Nivel 5</option>
                    </select>
                </div>
            </div>
        <button type="submit" class="btn btn-success">Publicar puesto</button>
        <a th:href="@{/empresa/puestos}" class="btn btn-secondary ms-2">Cancelar</a>
        </div>

    </form>
</div>

<footer th:replace="~{fragments/footer-interno :: footer-interno}"></footer>

</body>
</html>
