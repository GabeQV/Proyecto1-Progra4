<!-- templates/puestos/nuevo-puesto.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Publicar Puesto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
    </style>
</head>
<body>

<!-- ── NAVBAR ──────────────────────────────────────────── -->
<header class="bg-dark text-white p-3">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <h4 class="me-4 mb-0">BolsaEmpleo</h4>
            <nav>
                <a th:href="@{/empresa/dashboard}"    class="text-white-50 me-3 text-decoration-none">Dashboard</a>
                <a th:href="@{/empresa/puestos}"      class="text-white-50 me-3 text-decoration-none">Mis puestos</a>
                <a th:href="@{/empresa/puestos/nuevo}" class="text-white me-3 text-decoration-none fw-bold">Publicar puesto</a>
            </nav>
        </div>
        <div class="d-flex align-items-center">
            <span class="me-3" th:text="${empresa.nombre}"></span>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Salir</button>
            </form>
        </div>
    </div>
</header>

<!-- ── CONTENIDO ───────────────────────────────────────── -->
<div class="container mt-4 flex-grow-1">
    <h2>Publicar nuevo puesto</h2>

    <form th:action="@{/empresa/puestos/nuevo}" method="post">

        <!-- Descripción -->
        <div class="mb-3">
            <label class="form-label">Descripción del puesto</label>
            <input type="text" name="descripcion"
                   class="form-control" required/>
        </div>

        <!-- Salario -->
        <div class="mb-3">
            <label class="form-label">Salario ofrecido</label>
            <input type="number" name="salario" step="0.01"
                   class="form-control" required/>
        </div>

        <!-- Tipo de publicación -->
        <div class="mb-3">
            <label class="form-label">Tipo de publicación</label>
            <select name="tipoPuesto" class="form-select">
                <option value="publico">Público</option>
                <option value="privado">Privado</option>
            </select>
        </div>

        <!-- Características requeridas -->
        <div class="mb-3">
            <label class="form-label">Características requeridas</label>

            <!-- Una fila por característica -->
            <div class="row g-2 mb-2"
                 th:each="c : ${caracteristicas}">

                <div class="col-md-6">
                    <!-- Nombre visible al usuario -->
                    <input type="text" class="form-control"
                           th:value="${c.nombre}" readonly/>
                    <!-- ID que viaja al Controller -->
                    <input type="hidden"
                           name="idCaracteristicas"
                           th:value="${c.id}"/>
                </div>

                <div class="col-md-6">
                    <select name="niveles" class="form-select">
                        <option value="1">Nivel 1</option>
                        <option value="2">Nivel 2</option>
                        <option value="3">Nivel 3</option>
                        <option value="4">Nivel 4</option>
                        <option value="5">Nivel 5</option>
                    </select>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-success">Publicar puesto</button>
        <a th:href="@{/empresa/puestos}" class="btn btn-secondary ms-2">Cancelar</a>

    </form>
</div>

<!-- ── FOOTER ──────────────────────────────────────────── -->
<footer class="bg-dark text-white p-3 mt-auto text-center">
    <div class="container">
        <span class="me-3">Bolsa de Empleo - Total Soft Inc.</span> |
        <span class="mx-3">Contacto: info@bolsaempleo.local</span> |
        <span class="ms-3">Créditos: Equipo de desarrollo</span>
    </div>
</footer>

</body>
</html>
