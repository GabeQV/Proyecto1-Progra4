<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header-admin" class="bg-dark text-white p-3">
    <div class="container d-flex justify-content-between align-items-center">
        <h4 class="mb-0">BolsaEmpleo</h4>
        <nav>
            <a th:href="@{/admin/dashboard}" class="text-white me-3 text-decoration-none">Dashboard</a>
            <a th:href="@{/admin/empresas-pendientes}" class="text-white-50 me-3 text-decoration-none">Empresas</a>
            <a th:href="@{/admin/oferentes-pendientes}" class="text-white-50 me-3 text-decoration-none">Oferentes</a>
            <a th:href="@{/admin/caracteristicas}" class="text-white-50 me-3 text-decoration-none">Características</a>
            <a th:href="@{/admin/reportes}" class="text-white-50 me-3 text-decoration-none">Reportes</a>
        </nav>
        <div class="d-flex align-items-center">
            <span class="me-3" th:if="${adminEmail}" th:text="${adminEmail}"></span>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Salir</button>
            </form>
        </div>
    </div>
</header>
</body>
</html>
