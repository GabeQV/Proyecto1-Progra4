<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-container { max-width: 500px; margin: auto; padding-top: 100px; }
        .card { border-radius: 1rem; }
        .header { background-color: #343a40; color: white; }
        .footer { background-color: #343a40; color: white; position: fixed; bottom: 0; width: 100%; }
    </style>
</head>
<body>

<header class="header p-3">
    <div class="container d-flex justify-content-between align-items-center">
        <h4 class="mb-0">Bolsa de Empleo</h4>
        <nav>
            <a href="/buscar-puestos" class="text-white me-3 text-decoration-none">Buscar puestos</a>
            <a href="/registro-empresa" class="text-white me-3 text-decoration-none">Registro Empresa</a>
            <a href="/registro-oferente" class="text-white me-3 text-decoration-none">Registro Oferente</a>
            <a href="/login" class="btn btn-light">Login</a>
        </nav>
    </div>
</header>


<div class="container login-container">
    <div class="card p-4 shadow">
        <div class="card-body">
            <h2 class="text-center mb-4">Login</h2>

            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                Usuario o contraseña incorrectos. Por favor, inténtelo de nuevo.
            </div>

            <div th:if="${param.logout}" class="alert alert-success" role="alert">
                Has cerrado sesión exitosamente.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Usuario (Email)</label>
                    <input type="email" id="username" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Entrar</button>
                </div>
                <div class="d-grid">
                    <a href="/" class="btn btn-secondary">volver</a>
                </div>
            </form>
        </div>
    </div>
</div>

<footer class="footer p-3 mt-5 text-center">
    <div class="container">
        <span>Bolsa de Empleo - Total Soft Inc.</span> |
        <span>Contacto: info@bolsaempleo.local</span> |
        <span>Créditos: Equipo de desarrollo</span>
    </div>
</footer>

</body>
</html>
