<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="h-100">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
        }
        body {
            display: flex;
            flex-direction: column;
            background-color: #f8f9fa;
        }
        .content-wrapper {
            flex: 1 0 auto;
        }
        .login-container {
            max-width: 500px;
            margin: auto;
        }
        .card {
            border-radius: 1rem;
        }
    </style>
</head>

<body class="d-flex flex-column h-100">

<header class="header p-3" th:replace="~{fragments/header-publico :: header-publico}"></header>

<div class="content-wrapper">
    <div class="container login-container py-5">
        <div class="card p-4 shadow">
            <div class="card-body">
                <h2 class="text-center mb-4">Login</h2>

                <div th:if="${param.error}" class="alert alert-danger" role="alert">
                    Usuario o contraseña incorrectos. Por favor, inténtelo de nuevo.
                </div>

                <div th:if="${param.pendiente}" class="alert alert-warning" role="alert">
                    Tu cuenta aún no ha sido aprobada por el administrador.
                    Por favor, esperá a que sea revisada antes de iniciar sesión.
                </div>


                <div th:if="${param.logout}" class="alert alert-success" role="alert">
                    Has cerrado sesión exitosamente.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuario (Email)</label>
                        <input type="email" id="username" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" id="password" name="password" class="form-control" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Entrar</button>
                        <a href="/" class="btn btn-secondary">Volver a la Página Principal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>


<footer class="footer p-3 text-center" th:replace="~{fragments/footer-publico :: footer-publico}"></footer>

</body>
</html>
