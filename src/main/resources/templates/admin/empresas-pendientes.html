<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin - Empresas Pendientes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .content { flex: 1; }
    .footer { background-color: #343a40; color: #ccc; }
  </style>
</head>
<body>

<!-- Usamos un fragmento para no repetir el header y footer en cada página -->
<div th:replace="~{fragments/header :: header(adminEmail=${adminEmail})}"></div>

<div class="container content mt-5">
  <h1 class="mb-4">Empresas Pendientes de Aprobación</h1>

  <div th:if="${empresas.isEmpty()}" class="alert alert-info" role="alert">
    No hay empresas pendientes de aprobación en este momento.
  </div>

  <div th:if="${!empresas.isEmpty()}">
    <table class="table table-striped table-hover align-middle">
      <thead class="table-dark">
      <tr>
        <th>Correo del Usuario</th> <!-- Cambiamos el título de la columna -->
        <th class="text-center">Acción</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="empresa : ${empresas}">
        <td th:text="${empresa.usuario.correo}">rrhh@softlab.com</td>

        <td class="text-center">
          <form th:action="@{/admin/empresas/aprobar/{id}(id=${empresa.id})}" method="post">
            <button type="submit" class="btn btn-success">Aprobar</button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
