<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        .content { flex: 1; }
        .footer { background-color: #343a40; color: #ccc; }
    </style>
</head>
<body>

<header th:replace="~{fragments/header-admin :: header-admin}"></header>

<div class="container content mt-5">
    <div class="bg-light p-5 rounded">
        <h1>Administrador</h1>
        <p class="lead">Aprobaciones, catálogo de características y reportes.</p>

        <div class="mt-4">
            <a th:href="@{/admin/empresas-pendientes}" class="btn btn-primary btn-lg me-2">Empresas pendientes</a>
            <a th:href="@{/admin/oferentes-pendientes}" class="btn btn-primary btn-lg me-2">Oferentes pendientes</a>
            <a th:href="@{/admin/caracteristicas}" class="btn btn-primary btn-lg me-2">Características</a>
            <a th:href="@{/admin/reportes}" class="btn btn-primary btn-lg">Reportes</a>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer-interno :: footer-interno}"></footer>

</body>
</html>
