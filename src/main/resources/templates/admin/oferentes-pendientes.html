<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Oferentes Pendientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        .content { flex: 1; }
        .footer { background-color: #343a40; color: #ccc; }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header(adminEmail=${adminEmail})}"></div>

<div class="container content mt-5">
    <h1 class="mb-4">Oferentes Pendientes de Aprobación</h1>

    <div th:if="${oferentes.isEmpty()}" class="alert alert-info" role="alert">
        No hay oferentes pendientes de aprobación en este momento.
    </div>

    <div th:if="${!oferentes.isEmpty()}">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>Correo del Usuario</th>
                <th>Nombre Completo</th>
                <th class="text-center">Acción</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="oferente : ${oferentes}">
                <td th:text="${oferente.usuario.correo}"></td>
                <td th:text="${oferente.nombre + ' ' + oferente.primerApellido}"></td>
                <td class="text-center">
                    <form th:action="@{/admin/oferentes/aprobar/{id}(id=${oferente.id})}" method="post">
                        <button type="submit" class="btn btn-success">Aprobar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
