<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Características</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .content {
            flex: 1;
        }
        .footer {
            background-color: #343a40;
            color: #ccc;
        }

        .form-card { background-color: #f0fff0; border: 1px solid #d4edda; }
        .breadcrumb-item a { text-decoration: none; }
    </style>
</head>
<body>

<header th:replace="~{fragments/header-admin :: header-admin}"></header>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-7">
            <h3>Características</h3>

            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/admin/caracteristicas}">Raíces</a></li>
                    <li class="breadcrumb-item" th:each="crumb : ${breadcrumbs}">
                        <a th:href="@{/admin/caracteristicas(actualId=${crumb.id})}" th:text="${crumb.nombre}"></a>
                    </li>
                </ol>
            </nav>

            <h5 th:text="${titulo}">Categorías</h5>

            <ul class="list-group">
                <li th:each="cat : ${subCategorias}" class="list-group-item d-flex justify-content-between align-items-center">
                    <span th:text="${cat.nombre}"></span>
                    <a th:href="@{/admin/caracteristicas(actualId=${cat.id})}" class="btn btn-outline-primary btn-sm">Entrar</a>
                </li>
            </ul>
            <div th:if="${subCategorias.isEmpty()}" class="alert alert-info mt-3">
                No hay subcategorías para mostrar.
            </div>
        </div>

        <div class="col-md-5">
            <div class="card form-card">
                <div class="card-body">
                    <h5 class="card-title">Agregar Característica</h5>
                    <form th:action="@{/admin/caracteristicas/agregar}" th:object="${nuevaCaracteristica}" method="post">
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre" th:field="*{nombre}" required>
                        </div>
                        <div class="mb-3">
                            <label for="padre" class="form-label">Padre</label>
                            <select class="form-select" id="padre" th:field="*{idPadre}">
                                <option value="0">(sin padre)</option>
                                <option th:each="padreOpt : ${listaTodosPadres}"
                                        th:value="${padreOpt.id}"
                                        th:text="${padreOpt.nombre}">
                                </option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Crear</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer-interno :: footer-interno}"></footer>

</body>
</html>
