<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Reportes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
    </style>
</head>
<body>

<header th:replace="~{fragments/header-admin :: header-admin}"></header>

<div class="container mt-4 flex-grow-1">
    <h3>Reportes</h3>
    <p class="text-muted">Generá un reporte PDF de puestos registrados por mes.</p>

    <div class="card" style="max-width: 420px;">
        <div class="card-body">
            <h5 class="card-title">Reporte por mes</h5>

            <form th:action="@{/admin/reportes/descargar}" method="get">

                <div class="mb-3">
                    <label class="form-label">Mes</label>
                    <select name="mes" class="form-select">
                        <option th:each="nombre, iterStat : ${meses}"
                                th:value="${iterStat.index + 1}"
                                th:text="${nombre}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Año</label>
                    <input type="number"
                           name="anio"
                           class="form-control"
                           th:value="${anioActual}"
                           min="2020"
                           th:max="${anioActual}">
                </div>

                <button type="submit" class="btn btn-danger">
                    Descargar PDF
                </button>

            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer-interno :: footer-interno}"></footer>

</body>
</html>
