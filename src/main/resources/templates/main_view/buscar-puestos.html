<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Buscar Puestos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
    </style>
</head>
<body>

<header th:replace="~{fragments/header-publico :: header-publico}"></header>

<div class="container mt-4 flex-grow-1">
    <h3>Buscar puestos por características</h3>

    <!-- FORMULARIO DE BÚSQUEDA -->
    <!-- method="get" para que los ids queden en la URL -->
    <form th:action="@{/buscar-puestos}" method="get">
        <div class="border rounded p-3 mb-4">

            <!-- th:each itera la lista "caracteristicas" que mandó el controller -->
            <div th:each="cat : ${caracteristicas}" class="mb-1">
                <div class="form-check">
                    <!-- th:value pone el id de la característica como valor del checkbox -->
                    <!-- th:text pone el nombre visible -->
                    <input class="form-check-input"
                           type="checkbox"
                           name="ids"
                           th:value="${cat.id}"
                           th:id="'cat' + ${cat.id}">
                    <label class="form-check-label"
                           th:for="'cat' + ${cat.id}"
                           th:text="${cat.nombre}">
                    </label>
                </div>
            </div>

        </div>

        <button type="submit" class="btn btn-primary">Buscar</button>
        <a th:href="@{/buscar-puestos}" class="btn btn-secondary ms-2">Limpiar</a>
    </form>

    <!-- RESULTADOS — solo se muestran si el controller puso "resultados" en el model -->
    <div th:if="${resultados != null}">
        <h5 class="mt-4">Resultados</h5>

        <div th:if="${resultados.isEmpty()}" class="alert alert-info">
            No se encontraron puestos con esas características.
        </div>

        <!-- th:each itera cada puesto encontrado -->
        <div th:each="p : ${resultados}" class="card mb-2">
            <div class="card-body">
                <!-- p.idEmpresa es el objeto Empresa relacionado -->
                <h6 th:text="${p.idEmpresa.nombre}">Empresa</h6>
                <p th:text="${p.descripcion}" class="mb-1">Descripción</p>
                <span class="text-muted">Salario: </span>
                <span th:text="${p.salario}">0</span>
            </div>
        </div>

    </div>
</div>

<footer th:replace="~{fragments/footer-publico :: footer-publico}"></footer>

</body>
</html>
